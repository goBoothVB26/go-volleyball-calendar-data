<!-- "View Programs" button — paste into its own Squarespace CODE
     block, wherever you want it on any page (e.g. alongside the
     Submit an Event / Volunteer / Read Our Blog buttons, or in the
     site nav area). Links to the Programs page on the site itself, so
     it navigates in the same tab (matching the Blog button, not the
     external-form Submit/Volunteer buttons). -->

<style>
  .vb-submit-btn-wrap { text-align: center; }
  .vb-submit-btn {
    display: inline-block; padding: 10px 26px; cursor: pointer;
    border: 1px solid #0057b8; background: #0057b8; color: #fff;
    border-radius: 12px; font-size: 15px; font-weight: 600;
    letter-spacing: 0.03em; text-decoration: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    transition: background 0.15s, box-shadow 0.15s, transform 0.15s;
  }
  .vb-submit-btn:hover {
    background: #00458f;
    box-shadow: 0 4px 10px rgba(0,0,0,0.22); transform: translateY(-1px);
  }

  /* Dark mode (when the calendar's toggle is on): GOVB yellow with
     dark text for contrast */
  body.vb-dark-page .vb-submit-btn {
    background: #FFC425; border-color: #FFC425; color: #1a1a1a;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  body.vb-dark-page .vb-submit-btn:hover { background: #e6ad0f; }
</style>

<div class="vb-submit-btn-wrap">
  <a class="vb-submit-btn" href="https://www.govolleyball.org/programs">View Programs</a>
</div>
