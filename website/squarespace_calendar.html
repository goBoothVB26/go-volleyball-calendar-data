    onScroll = function () { setTimeout(dismiss, 350); };
    _toastTimer = setTimeout(dismiss, 6000);
    _toastScrollHandler = onScroll;
    window.addEventListener("scroll", onScroll, { capture: true, passive: true, once: true });
  }

  // Native share sheet (iOS/Android "share drawer", desktop share
  // panel where supported) with a clipboard-copy fallback for browsers
  // that don't implement the Web Share API (most desktop browsers).
  function shareEvent(ev, btn) {
    var url = shareUrl(ev);
    var text = titled(ev) + " — " +
      MONTHS[ev._start.getMonth()] + " " + ev._start.getDate() +
      (ev.all_day ? "" : " · " + fmtTime(ev._start)) +
      (ev.location ? " @ " + ev.location : "");

    if (navigator.share) {
      navigator.share({ title: titled(ev), text: text, url: url }).catch(function () {});
      return;
    }
    // Fallback: copy the link and flash a quick confirmation on the button
    var copyText = text + "\n" + url;
    var done = function () {
      if (!btn) return;
      var original = btn.getAttribute("aria-label");
      btn.classList.add("copied");
      btn.setAttribute("aria-label", "Link copied!");
      setTimeout(function () {
        btn.classList.remove("copied");
        btn.setAttribute("aria-label", original);
      }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(copyText).then(done).catch(function () {});
    } else {
      // Ancient-browser fallback: a hidden textarea + execCommand
      var ta = document.createElement("textarea");
      ta.value = copyText;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand("copy"); done(); } catch (e) {}
      document.body.removeChild(ta);
    }
  }

  // Turn emails, URLs, and phone numbers in (already-escaped)
  // description text into clickable links. Emails and URLs are pulled
  // out first via \u0000 placeholders so the phone pass can't touch
  // digits inside them.
  var _EMAIL_RE = /[\w.+-]+@[\w-]+(?:\.[\w-]+)+/g;
  var _URL_RE = /\b(?:https?:\/\/|www\.)[^\s<>"']+/gi;
  var _PHONE_RE = /(?:\+?1[\s.\-]?)?(?:\(\d{3}\)\s?|\d{3}[\s.\-])\d{3}[\s.\-]\d{4}\b/g;
  function linkifyContacts(text) {
    var links = [];
    function stash(html) {
      links.push(html);
      return "\u0000" + (links.length - 1) + "\u0000";
    }
    text = text.replace(_EMAIL_RE, function (m) {
      return stash('<a href="mailto:' + m + '">' + m + "</a>");
    });
    text = text.replace(_URL_RE, function (m) {
      // trailing sentence punctuation isn't part of the URL
      var trail = "";
      var t = m.replace(/[.,;:!?)]+$/, function (p) { trail = p; return ""; });
      var href = /^www\./i.test(t) ? "https://" + t : t;
      return stash('<a href="' + href + '" target="_blank" rel="noopener">' + t + "</a>") + trail;
    });
    text = text.replace(_PHONE_RE, function (m) {
      var tel = m.replace(/[^\d+]/g, "");
      return '<a href="tel:' + tel + '">' + m + "</a>";
    });
    return text.replace(/\u0000(\d+)\u0000/g, function (_, i) { return links[+i]; });
  }

  // Filter tags for an event, shared by the popup card and the reminder
  // email (sent along in the signup payload).
  //
  // Skill bubbles mirror the scraper's tagging EXACTLY -- no expansion.
  // The scraper (scraper/tagging.py) already enforces the real rule: an
  // event either carries specific skill buckets (Open, A/AA, B/BB,
  // combined as needed) OR is tagged "All Levels" exclusively when only
  // catch-all phrasing ("all skill levels", "new players", etc.) is
  // found -- never both. So the card just displays whatever the data
  // says, one bubble per bucket.
  //
  // Net height bubbles ALSO mirror the scraper exactly -- no expansion.
  // The scraper already decides who's welcome: unstated events are
  // tagged "Men's, Co-ed" by default, and Women's is added only when
  // explicitly stated, so an unstated event correctly shows Men's +
  // Co-ed bubbles and never an unearned Women's bubble. (NET_ORDER is
  // declared once, further up, and reused here.)
  function eventTags(ev) {
    var tags = [];
    if (ev.gym_type) tags.push(ev.gym_type);

    skillValues(ev).forEach(function (s) { tags.push("Skill: " + s); });

    var nets = netValues(ev);
    NET_ORDER.forEach(function (n) {
      if (nets.indexOf(n) >= 0) tags.push(n);
    });

    if (ev.price === 0) tags.push("Free");
    else if (ev.price !== null && ev.price !== undefined) tags.push("$" + ev.price);
    else tags.push("Price TBD/See Site");
    return tags;
  }

  function openModal(ev) {
    var tags = eventTags(ev);
    var when = MONTHS[ev._start.getMonth()] + " " + ev._start.getDate() +
               (ev.all_day ? " (all day)" : " · " + fmtTime(ev._start) + (ev._end ? " – " + fmtTime(ev._end) : ""));
    // Per-event image from the source site (e.g. Volleyball Life host
    // avatars) wins over the club-level logo when present
    var logoUrl = ev.image || CLUB_LOGOS[ev.club];
    var logoImg = logoUrl
      ? '<img class="vbcal-logo" src="' + logoUrl + '" alt="" ' +
        'onerror="this.style.display=\'none\'">'
      : "";
    var on = bookmarks()[ev.uid];
    // Events before today take no reminder signups and no calendar
    // adds -- their popup offers only More info / Register.
    var remindBtn = "";
    if (!isPastEvent(ev)) {
      remindBtn = notificationsEnabled()
        ? '<button class="btn vb-remind-btn' + (on ? " on" : "") + '" data-bm-uid="' + ev.uid.replace(/"/g, "&quot;") + '">' +
          '<svg viewBox="0 0 24 24"><path d="M6 3h12v18l-6-4.5L6 21z"/></svg>' +
          (on ? "Connected" : "Connect Me") + "</button>"
        : '<a class="btn" href="' + gcalUrl(ev) + '" target="_blank" rel="noopener">Add to Google Calendar</a>';
    }
    var html = '<button class="close" id="vb-close">&times;</button>' +
               '<button class="vb-share" data-share-uid="' + ev.uid.replace(/"/g, "&quot;") + '" title="Share this event" aria-label="Share this event">' +
               '<svg viewBox="0 0 24 24"><path d="M12 3v11.5M8 7l4-4 4 4M5 12v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6"/></svg>' +
               '</button>' +
               '<div class="headrow">' + logoImg +
               '<div class="headtext">' +
               "<h4>" + esc(titled(ev)) + "</h4>" +
               '<div class="clubline">' + esc(ev.club) + "</div>" +
               '<div class="when">' + when + "</div>" +
               (ev.location
                 ? '<div class="loc" style="margin-top:4px">&#128205; <a href="' + mapsUrl(ev.location) +
                   '" target="_blank" rel="noopener">' + esc(ev.location) + "</a></div>"
                 : "") +
               '<div class="vbcal-tagrow">' + tags.map(function (t) { return '<span class="vbcal-tag">' + esc(t) + "</span>"; }).join("") + "</div>" +
               "</div></div>" +
               (ev.description ? '<div class="desc">' + linkifyContacts(esc(ev.description).slice(0, 1200)) + "</div>" : "") +
               remindBtn +
               (ev.url ? '<a class="btn alt" href="' + ev.url + '" target="_blank" rel="noopener">More info / Register</a>' : "") +
               // Inline signup section: hidden until Connect Me is
               // pressed, then the popup expands to reveal it
               (notificationsEnabled() && !isPastEvent(ev)
                 ? '<div class="vb-signup vb-inline-signup" id="vb-inline-signup" style="display:none">' +
                   '<p id="vb-signup-event">Enter your email and we\'ll send you reminders before &ldquo;' + esc(ev.title) + '&rdquo; starts.</p>' +
                   '<input type="email" id="vb-signup-email" placeholder="you@email.com" autocomplete="email">' +
                   '<div class="actions"><button class="vbcal-btn" id="vb-signup-submit">Get Notified</button></div>' +
                   '<div class="msg" id="vb-signup-msg"></div>' +
                   // Only appears after a successful signup, matching
                   // the confirmation email's wording exactly.
                   '<p class="vb-signup-note" id="vb-signup-note" style="display:none">Note: this sets up' +
                   ' email reminders only &mdash; it does not register you for the event. Be sure to' +
                   ' register separately if the event requires it.</p>' +
                   "</div>"
                 : "");
    var modal = $("vb-modal");
    modal.innerHTML = html;
    modal.style.borderLeftColor = clubColors[ev.club] || DEFAULT_COLOR;
    $("vb-overlay").style.display = "flex";
    lockPageScroll();
    // Pixel-snap the card via margins: flex centering can land it on a
    // half-pixel, which blurs text on standard-DPI screens. Margins are
    // used (NOT transform) because any transform promotes the card to a
    // GPU layer, where text loses subpixel antialiasing and looks fuzzy
    // on desktop regardless of position.
    modal.style.transform = "none";
    modal.style.marginLeft = "";
    modal.style.marginTop = "";
    var r = modal.getBoundingClientRect();
    var dx = Math.round(r.left) - r.left, dy = Math.round(r.top) - r.top;
    if (dx) modal.style.marginLeft = dx + "px";
    if (dy) modal.style.marginTop = dy + "px";
    $("vb-close").onclick = closeModal;
    if (notificationsEnabled() && !isPastEvent(ev)) {
      signupEvent = ev;
      $("vb-signup-submit").onclick = submitSignup;
    }
  }
  function closeModal() {
    $("vb-overlay").style.display = "none";
    unlockPageScroll();
  }

  // Mobile: freeze the page behind an open popup so the only thing
  // that scrolls is the popup's own content. position:fixed is the
  // technique iOS Safari actually honors; the scroll position is
  // saved and restored on close.
  var _scrollLockY = -1;
  function lockPageScroll() {
    if (_scrollLockY >= 0 || !window.matchMedia("(max-width: 767px)").matches) return;
    _scrollLockY = window.scrollY || document.documentElement.scrollTop || 0;
    var b = document.body;
    b.style.position = "fixed";
    b.style.top = -_scrollLockY + "px";
    b.style.left = "0"; b.style.right = "0"; b.style.width = "100%";
    b.style.overflow = "hidden";
  }
  function unlockPageScroll() {
    if (_scrollLockY < 0) return;
    var b = document.body;
    b.style.position = ""; b.style.top = ""; b.style.left = "";
    b.style.right = ""; b.style.width = ""; b.style.overflow = "";
    // Restore INSTANTLY: the site's scroll-behavior:smooth would
    // otherwise animate from the top back down to the saved spot
    // (visible as a scroll-to-top-then-jump on close).
    var root = document.documentElement;
    var prev = root.style.scrollBehavior;
    root.style.scrollBehavior = "auto";
    window.scrollTo({ top: _scrollLockY, left: 0, behavior: "instant" });
    root.style.scrollBehavior = prev;
    _scrollLockY = -1;
  }

  // ---- Sign up for Notifications (inline section in the popup) ----
  var signupEvent = null;

  // Expand the popup's signup section (opening the popup first if the
  // click came from a carousel bookmark).
  // An event is past only once its day (or last day) is before TODAY --
  // events happening today still take signups all day
  function isPastEvent(ev) {
    var last = ev._end || ev._start;
    var todayStart = new Date();
    todayStart.setHours(0, 0, 0, 0);
    return last < todayStart;
  }

  function openSignup(ev) {
    if (isPastEvent(ev)) return;  // no reminders for past events
    var section = $("vb-inline-signup");
    if (!section || signupEvent !== ev) {
      openModal(ev);
      section = $("vb-inline-signup");
    }
    if (!section) return;
    section.style.display = "block";
    $("vb-signup-email").value = localStorage.getItem("vbcalEmail") || "";
    $("vb-signup-msg").textContent = "";
    $("vb-signup-msg").className = "msg";
    // The "this doesn't register you" note only appears after a
    // successful signup (see submitSignup) -- hide it on a fresh open.
    var note = $("vb-signup-note");
    if (note) note.style.display = "none";
    // The signup section sits near the bottom of the popup, below the
    // description/tags -- scroll it into view so opening it from a
    // carousel bookmark is visibly obvious, not just an off-screen
    // change the visitor has to notice by scrolling themselves.
    section.scrollIntoView({ behavior: "smooth", block: "nearest" });
    $("vb-signup-email").focus();
  }

  function submitSignup() {
    var email = $("vb-signup-email").value.trim();
    var msg = $("vb-signup-msg");
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
      msg.textContent = "Please enter a valid email address.";
      msg.className = "msg err";
      return;
    }
    var ev = signupEvent;
    fetch(NOTIFY_ENDPOINT, {
      method: "POST",
      mode: "no-cors",  // Apps Script web apps don't send CORS headers
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        email: email, uid: ev.uid, title: titled(ev),  // "[GOVB] Title" so emails carry the club prefix too
        start: ev.start, club: ev.club, url: ev.url || "",
        // Extra card data so the reminder email can render the same
        // event card the calendar shows (tags, ribbon color, logo...)
        extra: {
          location: ev.location || "",
          end: ev.end || "",
          tags: eventTags(ev),
          color: clubColors[ev.club] || DEFAULT_COLOR,
          logo: ev.image || CLUB_LOGOS[ev.club] || "",
        },
      }),
    }).catch(function () {});  // fire-and-forget

    localStorage.setItem("vbcalEmail", email);
    var bm = bookmarks();
    bm[ev.uid] = true;
    localStorage.setItem("vbcalBookmarks", JSON.stringify(bm));

    msg.textContent = "You will be notified! Opening Google Calendar…";
    msg.className = "msg ok";
    // Flip any visible icons/buttons for this event to the "set" state
    var sel = '[data-bm-uid="' + ev.uid.replace(/"/g, '\\"') + '"]';
    Array.prototype.forEach.call(document.querySelectorAll(sel), function (el) {
      el.className += el.className.indexOf(" on") < 0 ? " on" : "";
      if (el.className.indexOf("vb-remind-btn") >= 0) {
        el.innerHTML = el.innerHTML.replace("Connect Me", "Connected");
      }
    });
    // This note only appears once someone has actually signed up,
    // matching the confirmation email's wording exactly.
    var note = $("vb-signup-note");
    if (note) note.style.display = "block";
    // Hand off to the Add-to-Google-Calendar flow (same user gesture,
    // so popup blockers allow it)
    window.open(gcalUrl(ev), "_blank", "noopener");
  }

  // "Sun Jul 19th" style date, like Volleyball Life's cards
  function fmtCardDate(d) {
    var day = d.getDate(), suffix = "th";
    if (day % 10 === 1 && day !== 11) suffix = "st";
    else if (day % 10 === 2 && day !== 12) suffix = "nd";
    else if (day % 10 === 3 && day !== 13) suffix = "rd";
    return DOWS[d.getDay()] + " " + MONTHS[d.getMonth()].slice(0, 3) + " " + day + suffix;
  }

  function notificationsEnabled() {
    return NOTIFY_ENDPOINT.indexOf("http") === 0;
  }
  function bookmarks() {
    try { return JSON.parse(localStorage.getItem("vbcalBookmarks") || "{}"); }
    catch (e) { return {}; }
  }
  // Corner bookmark on carousel cards. (The event popup uses the
  // combined "Connect Me" button instead -- see openModal.)
  function bookmarkIcon(uid) {
    if (!notificationsEnabled()) return "";
    var on = bookmarks()[uid];
    return '<button class="vb-bm' + (on ? " on" : "") +
           '" data-bm-uid="' + uid.replace(/"/g, "&quot;") + '" title="Sign up for Notifications">' +
           '<svg viewBox="0 0 24 24"><path d="M6 3h12v18l-6-4.5L6 21z"/></svg></button>';
  }
  // Corner share icon on carousel cards -- sits left of the bookmark
  // slot at a fixed position regardless of whether the bookmark itself
  // is rendered, so its placement never shifts around. Lives in the
  // footer row (see renderCarousel) on every device -- the old top-
  // right corner spot clipped under longer titles even on desktop.
  function shareIconCar(uid) {
    return '<button class="vb-share-car" data-share-uid="' + uid.replace(/"/g, "&quot;") +
           '" title="Share this event" aria-label="Share this event">' +
           '<svg viewBox="0 0 24 24"><path d="M12 3v11.5M8 7l4-4 4 4M5 12v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6"/></svg></button>';
  }

  function renderCarousel() {
    var now = new Date();
    var windowStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - CAROUSEL_DAYS_BACK);
    var windowEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate() + CAROUSEL_DAYS_AHEAD + 1);

    var shown = allEvents.filter(function (ev) {
      return ev.club === CAROUSEL_CLUB &&
             (ev._end || ev._start) >= windowStart && ev._start < windowEnd;
    }).sort(function (a, b) { return a._start - b._start; });

    if (!shown.length) return;  // keep the carousel hidden

    var firstUpcoming = -1, html = "";
    shown.forEach(function (ev, i) {
      var isPast = (ev._end || ev._start) < now;
      if (!isPast && firstUpcoming < 0) firstUpcoming = i;
      var dateText = fmtCardDate(ev._start);
      if (ev.all_day && ev._end) {
        var lastDay = new Date(ev._end.getFullYear(), ev._end.getMonth(), ev._end.getDate() - 1);
        if (lastDay > ev._start) dateText += " - " + fmtCardDate(lastDay);
      }
      var timeText = ev.all_day ? "All day" : fmtTime(ev._start) + (ev._end ? " – " + fmtTime(ev._end) : "");
      var tagLine = [ev.gym_type, ev.skill_level].filter(Boolean).join(" · ");
      html += '<div class="vbcar-card' + (isPast ? " past" : "") +
              '" data-uid="' + ev.uid.replace(/"/g, "&quot;") + '" role="button" tabindex="0">' +
              (isPastEvent(ev) ? "" : bookmarkIcon(ev.uid)) +  // reminders allowed through today
              '<div class="t">' + esc(ev.title) + "</div>" +
              '<div class="d">' + esc(dateText) + "</div>" +
              (ev.location ? '<div class="m">' + esc(ev.location) + "</div>" : "") +
              (tagLine ? '<div class="m">' + esc(tagLine) + "</div>" : "") +
              (CAROUSEL_LOGO
                ? '<img class="vbcar-logo vbcar-logo-light" src="' + CAROUSEL_LOGO + '" alt="" onerror="this.style.display=\'none\'">' +
                  '<img class="vbcar-logo vbcar-logo-dark" src="' + CAROUSEL_LOGO_DARK + '" alt="" onerror="this.style.display=\'none\'">'
                : "") +
              "<hr>" +
              '<div class="f">' + shareIconCar(ev.uid) +
              '<span class="ftime">' + esc(timeText) + "</span></div></div>";
    });
    var track = $("vbcar-track");
    track.innerHTML = html;
    $("vb-carousel").style.display = "";
    $("vbcar-prev").onclick = function () { track.scrollBy({ left: -480 }); };
    $("vbcar-next").onclick = function () { track.scrollBy({ left: 480 }); };

    // Dim the chevrons at either end of the track
    function updateChevrons() {
      var atStart = track.scrollLeft <= 2;
      var atEnd = track.scrollLeft + track.clientWidth >= track.scrollWidth - 2;
      $("vbcar-prev").className = "vbcar-chev" + (atStart ? " disabled" : "");
      $("vbcar-next").className = "vbcar-chev" + (atEnd ? " disabled" : "");
    }
    track.onscroll = updateChevrons;

    // Start scrolled to the next upcoming event (past-week cards sit to
    // the left, reachable by scrolling back).
    if (firstUpcoming > 0) {
      var card = track.children[firstUpcoming];
      track.scrollLeft = Math.max(0, card.offsetLeft - track.offsetLeft);
    }
    updateChevrons();
  }

  function init(data) {
    allEvents = data.events.map(function (ev) {
      ev.club = canonClub(ev.club);
      ev._start = parseDT(ev.start);
      ev._end = ev.end ? parseDT(ev.end) : null;
      return ev;
    });
    var clubs = [];
    allEvents.forEach(function (ev) {
      if (clubs.indexOf(ev.club) < 0) clubs.push(ev.club);
    });
    clubs.sort().forEach(function (c) { clubColors[c] = CLUB_COLORS[c] || DEFAULT_COLOR; });

    ["vb-f-gym", "vb-f-skill", "vb-f-net", "vb-f-price", "vb-f-club", "vb-f-loc"].forEach(function (id) {
      $(id).onchange = render;
      initDD(id);
    });
    if (DEFAULT_CLUB && clubs.indexOf(DEFAULT_CLUB) >= 0) {
      // rebuildFilters (inside render) repopulates options while keeping
      // the current selection, so seed the club select directly.
      var o = document.createElement("option");
      o.value = DEFAULT_CLUB; o.textContent = DEFAULT_CLUB;
      $("vb-f-club").appendChild(o);
      $("vb-f-club").value = DEFAULT_CLUB;
    }
    renderCarousel();
    if ($("vb-carousel").style.display === "none") {
      document.querySelector(".vbcal-section-title").appendChild($("vb-theme"));
    }

    // Deep link from a shared event: ?event=<uid> in the URL jumps the
    // calendar to that event's month and opens its popup automatically,
    // so a link someone shares is actually useful to whoever opens it.
    var sharedUid = new URLSearchParams(location.search).get("event");
    var sharedEv = sharedUid && allEvents.filter(function (x) { return x.uid === sharedUid; })[0];
    if (sharedEv) current = new Date(sharedEv._start.getFullYear(), sharedEv._start.getMonth(), 1);

    render();
    if (sharedEv) openModal(sharedEv);
  }

  // Haptic feedback on selections: a short 10ms tick on devices that
  // expose the Vibration API (Android). iOS never exposes vibration to
  // web pages, so iPhone users get the visual press-squish (CSS :active
  // rules) instead. One delegated touch listener covers every tappable
  // element in the widget.
  var BUZZ_TARGETS = ".vbcal-btn, .vb-dd-field, .vb-dd-item, .vbcal-chip, " +
    ".vbcal-item, .vb-bm, .vbcar-card, .vbcar-chev, .vb-week-chev, " +
    ".vbcal-day.busy, .vbcal-modal .btn, .vbcal-modal .close, .vb-theme-btn, .vb-share, .vb-share-car";
  document.addEventListener("touchstart", function (e) {
    if (!navigator.vibrate) return;
    if (e.target.closest && e.target.closest(BUZZ_TARGETS)) navigator.vibrate(10);
  }, { passive: true });

  document.addEventListener("click", function (e) {
    var shareEl = e.target.closest ? e.target.closest("[data-share-uid]") : null;
    if (shareEl) {
      var shareUid = shareEl.getAttribute("data-share-uid");
      var shareEv = allEvents.filter(function (x) { return x.uid === shareUid; })[0];
      if (shareEv) shareEvent(shareEv, shareEl);
      return;  // don't also close the popup
    }
    var bmEl = e.target.closest ? e.target.closest("[data-bm-uid]") : null;
    if (bmEl) {
      var bmUid = bmEl.getAttribute("data-bm-uid");
      var bmEv = allEvents.filter(function (x) { return x.uid === bmUid; })[0];
      if (bmEv) {
        // Already signed up for this event -- whether tapped from the
        // carousel's corner bookmark icon or the popup's "Connected"
        // button, show a confirmation toast instead of (re)opening the
        // email signup form.
        var isBookmarkControl = bmEl.classList.contains("vb-bm") || bmEl.classList.contains("vb-remind-btn");
        if (isBookmarkControl && bookmarks()[bmUid]) {
          showToast("You're already signed up! You'll receive reminders for this event.");
        } else {
          openSignup(bmEv);
        }
      }
      return;  // don't also open the event modal
    }
    var el = e.target.closest ? e.target.closest("[data-uid]") : null;
    if (el) {
      var uid = el.getAttribute("data-uid");
      var ev = allEvents.filter(function (x) { return x.uid === uid; })[0];
      if (ev) openModal(ev);
      return;
    }
    var dayEl = e.target.closest ? e.target.closest(".vbcal-day.busy[data-daykey]") : null;
    if (dayEl) {
      var p = dayEl.getAttribute("data-daykey").split("-");
      var tapped = new Date(+p[0], +p[1] - 1, +p[2]);
      weekFocus = new Date(tapped.getFullYear(), tapped.getMonth(), tapped.getDate() - tapped.getDay());
      weekTappedKey = dayEl.getAttribute("data-daykey");
      render();
    }
    if (e.target === $("vb-overlay")) closeModal();
  });

  // Desktop: filters sit inside the toolbar row (between the nav arrows
  // and the Month/List buttons). Mobile: back above the calendar behind
  // the Show Filters toggle. Re-homed live on resize/rotation.
  (function () {
    var mqDesk = window.matchMedia("(min-width: 768px)");
    var toolbar = document.querySelector(".vbcal-toolbar");
    var count = $("vb-count");
    function homeFilters() {
      var f = $("vb-filters");
      var tog = document.querySelector(".vbcal-filter-toggle");
      if (mqDesk.matches) {
        toolbar.insertBefore(f, toolbar.lastElementChild);
        count.parentNode.insertBefore(tog, count);  // toggle back home (hidden)
      } else {
        // Show/Hide Filters takes the toolbar's center column; the
        // filter panel itself opens below the toolbar row
        toolbar.insertBefore(tog, toolbar.lastElementChild);
        toolbar.parentNode.insertBefore(f, $("vb-grid"));
      }
    }
    if (mqDesk.addEventListener) mqDesk.addEventListener("change", homeFilters);
    homeFilters();
  })();

  function monthStep(delta) {
    if (weekFocus && view === "month") {
      // While zoomed, the arrows/swipes step a week at a time
      weekFocus = new Date(weekFocus.getFullYear(), weekFocus.getMonth(), weekFocus.getDate() + delta * 7);
      current = new Date(weekFocus.getFullYear(), weekFocus.getMonth(), 1);
    } else {
      current = new Date(current.getFullYear(), current.getMonth() + delta, 1);
    }
    render();
  }
  $("vb-prev").onclick = function () { monthStep(-1); };
  $("vb-next").onclick = function () { monthStep(1); };
  $("vb-week-back").onclick = function () { weekFocus = null; render(); };

  // Touch gestures on the calendar (grid or list):
  //  - swipe left/right changes month (or week while zoomed)
  //  - pinch-in while zoomed into a week closes the zoom
  ["vb-grid", "vb-list"].forEach(function (id) {
    var el = $(id), sx = 0, sy = 0, pinchStart = 0, pinchLast = 0, pinching = false;
    function dist(t) {
      var dx = t[0].clientX - t[1].clientX, dy = t[0].clientY - t[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }
    var weekScrollStart = 0;
    el.addEventListener("touchstart", function (e) {
      if (e.touches.length === 2) {
        pinching = true;
        pinchStart = pinchLast = dist(e.touches);
      } else if (e.touches.length === 1 && !pinching) {
        sx = e.touches[0].clientX; sy = e.touches[0].clientY;
        var wk = el.querySelector(".vbcal-week");
        weekScrollStart = wk ? wk.scrollLeft : 0;
      }
    }, { passive: true });
    el.addEventListener("touchmove", function (e) {
      if (pinching && e.touches.length === 2) pinchLast = dist(e.touches);
    }, { passive: true });
    el.addEventListener("touchend", function (e) {
      if (pinching) {
        if (e.touches.length === 0) {
          // fingers lifted: pinch-in (zoom out) closes the week zoom
          if (weekFocus && pinchStart > 0 && pinchLast < pinchStart * 0.75) {
            weekFocus = null;
            render();
          }
          pinching = false; pinchStart = pinchLast = 0;
        }
        return;  // never treat a pinch as a swipe
      }
      var dx = e.changedTouches[0].clientX - sx;
      var dy = e.changedTouches[0].clientY - sy;
      // If the gesture scrolled the week's own columns, it wasn't a
      // week-change swipe.
      var wk = el.querySelector(".vbcal-week");
      if (wk && Math.abs(wk.scrollLeft - weekScrollStart) > 10) return;
      if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
        monthStep(dx < 0 ? 1 : -1);  // swipe left -> forward
      }
    }, { passive: true });
  });
  $("vb-view-month").onclick = function () { view = "month"; weekFocus = null; render(); };
  $("vb-view-list").onclick = function () { view = "list"; weekFocus = null; render(); };
  $("vb-toggle-filters").onclick = function () {
    var f = $("vb-filters"), open = f.className.indexOf("open") >= 0;
    f.className = open ? "vbcal-filters" : "vbcal-filters open";
    this.textContent = open ? "Show Filters" : "Hide Filters";
    this.className = "vbcal-btn" + (open ? "" : " active");
  };

  // ---- Light / dark mode ----
  function applyTheme(dark) {
    var targets = [$("vbcal"), $("vb-overlay")];
    targets.forEach(function (el) {
      var base = el.className.replace(/\s*vb-dark/g, "");
      el.className = dark ? base + " vb-dark" : base;
    });
    // Also flag the page body so site-wide dark styles (added in
    // Squarespace Design -> Custom CSS) can darken the rest of the page.
    document.body.classList.toggle("vb-dark-page", dark);
  }
  function prefersDark() {
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  }
  // A manual theme choice is kept in localStorage (so it survives quick
  // tab closes/app-switches, e.g. on mobile) but EXPIRES 5 minutes after
  // the last time any tab was actively using the site -- storedTheme()
  // checks that on every read and self-clears once stale, so a choice
  // from days ago never overrides a fresh visit's device setting, while
  // a choice from moments ago (reopening a just-closed tab) still holds.
  // The timestamp is refreshed on load and periodically while a tab
  // stays open, so a long active session never expires out from under
  // someone mid-use.
  var THEME_TTL_MS = 5 * 60 * 1000;
  function storedTheme() {
    var stored = localStorage.getItem("vbcalTheme");
    var ts = +localStorage.getItem("vbcalThemeTS") || 0;
    if (stored && Date.now() - ts > THEME_TTL_MS) {
      localStorage.removeItem("vbcalTheme");
      localStorage.removeItem("vbcalThemeTS");
      return null;
    }
    return stored;
  }
  function touchThemeTS() {
    if (localStorage.getItem("vbcalTheme")) localStorage.setItem("vbcalThemeTS", String(Date.now()));
  }
  function currentDark() {
    var stored = storedTheme();
    return stored ? stored === "dark" : prefersDark();
  }
  $("vb-theme").onclick = function () {
    var dark = !currentDark();
    localStorage.setItem("vbcalTheme", dark ? "dark" : "light");
    localStorage.setItem("vbcalThemeTS", String(Date.now()));
    applyTheme(dark);
  };
  applyTheme(currentDark());
  touchThemeTS();
  document.addEventListener("visibilitychange", function () { if (!document.hidden) touchThemeTS(); });
  setInterval(touchThemeTS, 60000);

  // True liquid-glass warp (SVG filter in backdrop-filter) renders only
  // in Chromium; flag the body so the CSS opts in there. Safari and
  // Firefox never get the class and keep the plain blur fallback.
  if (window.chrome) document.body.classList.add("vb-warp");

  // Carousel-only mode: hide the whole Community Calendar section
  if (CAROUSEL_ONLY) $("vbcal").classList.add("vb-carousel-only");

  // Follow live device-theme changes for visitors who haven't chosen
  if (window.matchMedia) {
    var mq = window.matchMedia("(prefers-color-scheme: dark)");
    var onChange = function (e) {
      if (!storedTheme()) applyTheme(e.matches);
    };
    if (mq.addEventListener) mq.addEventListener("change", onChange);
  }

  // Move the modal overlay to <body>: Squarespace sections use CSS
  // transforms, which trap position:fixed elements inside them and let
  // later sections stack above the popup while scrolling.
  document.body.appendChild($("vb-overlay"));

  fetch(EVENTS_URL)
    .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(init)
    .catch(function (err) {
      $("vb-count").textContent = "Could not load events (" + err.message + "). Check EVENTS_URL.";
    });
})();
</script>
