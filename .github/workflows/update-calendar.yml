# Scheduled scraper run -- designed to live in the PUBLIC data repo
# (go-volleyball-calendar-data) alongside the scraper/ package, so the
# outputs (events.json, per-club .ics files, .cache/) are committed
# straight back into the same repo the website already reads from.
# See MIGRATION.md for the one-time move.
#
# No secrets needed: the workflow pushes with the repo's own
# GITHUB_TOKEN (enable "Read and write permissions" under
# Settings > Actions > General > Workflow permissions).

name: Update calendar data

on:
  schedule:
    # Every 6 hours (UTC). Orlando is UTC-4/-5, so this lands roughly
    # 2am/8am/2pm/8pm local. Edit the cron to taste.
    - cron: "0 2,8,14,20 * * *"
  workflow_dispatch: {}   # "Run workflow" button for manual runs

concurrency:
  group: update-calendar
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python -m scraper.main --output-dir .

      - name: Commit updated data
        run: |
          git config user.name "calendar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add events.json ./*_schedule.ics .cache
          if git diff --cached --quiet; then
            echo "No changes -- nothing to commit."
            exit 0
          fi
          git commit -m "Automated calendar update ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          # Retry the push a few times in case a manual push races us
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase
          done
          git push
